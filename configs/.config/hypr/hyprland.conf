


# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

#env = GTK_IM_MODULE,ibus
#env = QT_IM_MODULE,ibus
#env = XMODIFIERS,@im=ibus
#exec-once = ibus-daemon -drx

env = GTK_THEME,adw-gtk3-dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

input {
    kb_layout = us
    kb_variant = intl
}

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
    }
}

exec-once = hyprpaper
exec-once = kitty
exec-once = env DRI_PRIME=1 firefox
exec-once = thunar
exec-once = env DRI_PRIME=1 zed
exec-once = flatpak run com.spotify.Client
exec-once = sh -c "sleep 2; hyprctl dispatch workspace 1"

windowrule = workspace 1, match:class ^(kitty)$
windowrule = workspace 2, match:class ^(org.mozilla.firefox)$
windowrule = workspace 3, match:class ^(thunar)$
windowrule = workspace 4, match:class ^(dev.zed.Zed)$
windowrule = workspace 5, match:class ^(spotify)$

windowrule = opacity 0.92 0.92, match:class ^(kitty)$
windowrule = opacity 0.94 0.94, match:class ^(thunar)$

bind = SUPER, 6, workspace, 6
bind = SUPER SHIFT, 6, movetoworkspace, 6

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Microfone
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = SUPER, equal, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = SUPER, minus, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = SUPER, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, E, exec, wlogout

bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Navegar entre janelas/tile
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Alternativa com HJKL
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Mover janela atual
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Mandar janela para workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = SUPER, SPACE, togglefloating
bind = SUPER, F, fullscreen
bind = SUPER, P, pseudo
bind = SUPER SHIFT, SPACE, centerwindow

# criar/desfazer grupo com a janela atual
bind = SUPER, G, togglegroup

# alternar entre janelas dentro do grupo
bind = SUPER, Tab, changegroupactive, f
bind = SUPER SHIFT, Tab, changegroupactive, b

# jogar janela atual pra dentro do grupo do lado
bind = SUPER SHIFT, G, moveintogroup, l

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4

exec-once = /usr/bin/waybar


env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP
exec-once = systemctl --user start hyprland-session.target
